# ARGUS universe (R1 daily spine) — THE file to edit to choose what ARGUS tracks.
#
# Add or remove tickers here, then just run ARGUS. On the next nightly run:
#   * a ticker you ADDED is detected by j02c_yf_backfill, which pulls its full
#     deep history (back to 1990) once. Existing tickers are never re-fetched
#     or rewritten — their data is left exactly as it is.
#   * a ticker you REMOVED simply stops accruing. Its history is kept.
# No re-bootstrap, no wipe, no manual step. Editing before first setup is fine too.
#
# Ticker format: use the canonical DOTTED form for share classes (BRK.B, not
# BRK-B). Alpaca/Polygon want dots; the yfinance adapter re-spells it (_yf.py).
#
# COST: this file is the DAILY spine — roughly 1 API call per ticker per night,
# so it scales cheaply. Do NOT paste this list into watchlist.yaml: that one
# drives intraday tick capture at ~120-340 calls per ticker per session
# (~1 GB/session for 110 names). Keep the watchlist a small curated subset.
#
# Every ticker below was verified to return data from BOTH Alpaca and yfinance
# on 2026-07-15. Index membership itself is NOT machine-verified — reconcile
# against an official S&P 100 source if exact membership matters to you.
tickers:
